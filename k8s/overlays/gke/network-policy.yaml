apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: unity-mcp-network-policy
  namespace: unity-mcp
  labels:
    app: unity-mcp-server
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: unity-mcp-server
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - namespaceSelector:
        matchLabels:
          name: gke-system
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 6400
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          app: unity-mcp-server
    ports:
    - protocol: TCP
      port: 6400