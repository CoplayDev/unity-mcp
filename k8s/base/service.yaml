apiVersion: v1
kind: Service
metadata:
  name: unity-mcp-server
  labels:
    app: unity-mcp-server
    component: headless
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "unity-mcp-backend-config"}'
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: unity-mcp
    port: 6400
    targetPort: unity-mcp
    protocol: TCP
  selector:
    app: unity-mcp-server
    component: headless
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 300

---
apiVersion: v1
kind: Service
metadata:
  name: unity-mcp-server-headless
  labels:
    app: unity-mcp-server
    component: headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: unity-mcp
    port: 6400
    targetPort: unity-mcp
    protocol: TCP
  selector:
    app: unity-mcp-server
    component: headless