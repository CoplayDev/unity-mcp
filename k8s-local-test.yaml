---
apiVersion: v1
kind: Namespace
metadata:
  name: unity-mcp-local
  labels:
    name: unity-mcp-local

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unity-mcp-config
  namespace: unity-mcp-local
data:
  UNITY_HEADLESS: "true"
  UNITY_MCP_AUTOSTART: "true"
  UNITY_MCP_PORT: "6400"
  LOG_LEVEL: "INFO"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unity-mcp-server
  namespace: unity-mcp-local
  labels:
    app: unity-mcp-server
    component: headless
    tier: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: unity-mcp-server
      component: headless
  template:
    metadata:
      labels:
        app: unity-mcp-server
        component: headless
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: unity-mcp-server
        image: unity-mcp:enhanced-test
        imagePullPolicy: Never  # Use local image
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: unity-mcp
          containerPort: 6400
          protocol: TCP
        env:
        - name: UNITY_HEADLESS
          value: "true"
        - name: UNITY_MCP_AUTOSTART
          value: "true"
        - name: UNITY_MCP_PORT
          value: "6400"
        - name: LOG_LEVEL
          value: "INFO"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        envFrom:
        - configMapRef:
            name: unity-mcp-config
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 12
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
      dnsPolicy: ClusterFirst

---
apiVersion: v1
kind: Service
metadata:
  name: unity-mcp-server
  namespace: unity-mcp-local
  labels:
    app: unity-mcp-server
    component: headless
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: unity-mcp
    port: 6400
    targetPort: unity-mcp
    protocol: TCP
  selector:
    app: unity-mcp-server
    component: headless

---
apiVersion: v1
kind: Service
metadata:
  name: unity-mcp-server-nodeport
  namespace: unity-mcp-local
  labels:
    app: unity-mcp-server
    component: headless
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
    nodePort: 30080
  - name: unity-mcp
    port: 6400
    targetPort: unity-mcp
    protocol: TCP
    nodePort: 30400
  selector:
    app: unity-mcp-server
    component: headless